spring:
  application:
    name: visual-spider2
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:visual_spider2}?sslmode=disable
    username: ${APP_DB_USERNAME:visual_spider2}
    password: ${APP_DB_PASSWORD:visual_spider2}
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  quartz:
    auto-startup: true
    job-store-type: memory
  mvc:
    hiddenmethod:
      filter:
        enabled: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  playwright:
    browser: chromium
    timeout-ms: 15000
    headless: true

logging:
  level:
    com.visualspider: INFO
