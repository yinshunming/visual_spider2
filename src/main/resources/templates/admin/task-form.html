<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>创建任务</title></head>
<body>
<main>
    <h1>创建抓取任务</h1>
    <form method="post" th:action="@{/admin/tasks}" th:object="${taskForm}">
        <label>任务名称<input th:field="*{taskName}" type="text"></label><br>
        <label>URL 模板<input th:field="*{urlTemplate}" type="text" placeholder="https://www.sina.com.cn"></label><br>
        <label>已发布版本
            <select th:field="*{ruleVersionId}">
                <option value="">请选择</option>
                <option th:each="option : ${publishedVersions}" th:value="${option.versionId()}" th:text="${option.ruleName()} + ' v' + ${option.versionNo()}"></option>
            </select>
        </label><br>
        <label>Cron 表达式<input th:field="*{cronExpression}" type="text" placeholder="0 0/1 * * * ?"></label><br>
        <label>状态
            <select th:field="*{status}">
                <option value="ACTIVE">ACTIVE</option>
                <option value="PAUSED">PAUSED</option>
            </select>
        </label><br>
        <button type="submit">保存任务</button>
    </form>
</main>
</body>
</html>
